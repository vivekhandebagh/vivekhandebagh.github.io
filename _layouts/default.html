<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }} | {{ site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
  <!-- Load EB Garamond font first -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&display=swap" rel="stylesheet">
  
  <!-- Then load our main CSS -->
  <link rel="stylesheet" href="{{ '/assets/main.css' | relative_url }}">
  
  <!-- MathJax Configuration -->
  <script>
    MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
        processEscapes: true
      }
    };
  </script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body class="{% if page.layout == 'home' or page.url == '/' %}home{% endif %}">
  {% unless page.layout == 'post' %}
  <div class="leaves-container" id="leaves-container" aria-hidden="true"></div>
  {% endunless %}
  <header class="{% if page.layout == 'home' or page.url == '/' %}home-header{% endif %}">
    <h1><a href="{{ site.baseurl }}/">{{ site.title }}</a></h1>
  </header>
  
  <nav class="{% if page.layout == 'home' or page.url == '/' %}home-nav{% endif %}">
    <ul>
      <li><a href="{{ site.baseurl }}/">Home</a></li>
      <li><a href="{{ site.baseurl }}/blog">Blog</a></li>
    </ul>
  </nav>
  
  <main>
    {{ content }}
  </main>
  
  <footer>
    <p>&copy; {{ site.time | date: "%Y" }} {{ site.title }}</p>
  </footer>
  
  <button id="theme-toggle" aria-label="Toggle dark mode">
    <span id="theme-toggle-icon">🌙</span>
  </button>
  <script>
    // Theme toggle functionality
    const themeToggle = document.getElementById('theme-toggle');
    const themeToggleIcon = document.getElementById('theme-toggle-icon');
    const prefersDarkScheme = window.matchMedia('(prefers-color-scheme: dark)');
    
    // Function to set the theme
    function setTheme(theme) {
      if (theme === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
        themeToggleIcon.textContent = '☀️';
        localStorage.setItem('theme', 'dark');
      } else {
        document.documentElement.removeAttribute('data-theme');
        themeToggleIcon.textContent = '🌙';
        localStorage.setItem('theme', 'light');
      }
    }
    
    // Check for saved theme preference or use the system preference
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme) {
      setTheme(savedTheme);
    } else if (prefersDarkScheme.matches) {
      setTheme('dark');
    }
    
    // Toggle theme when button is clicked
    themeToggle.addEventListener('click', () => {
      const currentTheme = document.documentElement.getAttribute('data-theme');
      setTheme(currentTheme === 'dark' ? 'light' : 'dark');
    });
  </script>
  {% unless page.layout == 'post' %}
  <script>
    (function() {
      const container = document.getElementById('leaves-container');
      if (!container) return;

      const leafSVGs = [
        // simple oval leaf
        '<svg viewBox="0 0 24 24" width="22" height="22"><path d="M12 2C6.5 2 2 9 2 14c0 3 2.5 6 5 7.5.5-2 1.5-4 3-5.5 1.5-1.5 3-2.5 5-3C13.5 9 12.5 5 12 2z"/></svg>',
        // maple-ish leaf
        '<svg viewBox="0 0 24 24" width="20" height="20"><path d="M12 1c-1 4-3 6-5 7 1 1 2 3 2 5-2-1-4-1-6 0 2 2 3 4 3 6 2-1 4-1 6 0 0 2-1 3-2 5h4c-1-2-2-3-2-5 2 1 4 1 6 0 0-2 1-4 3-6-2-1-4-1-6 0 0-2 1-4 2-5-2-1-4-3-5-7z"/></svg>',
        // narrow willow leaf
        '<svg viewBox="0 0 24 24" width="18" height="24"><path d="M12 2Q8 8 8 14t4 8q4-2 4-8T12 2z"/></svg>'
      ];

      let interval;
      const MAX_LEAVES = 15;

      function createLeaf() {
        if (container.children.length >= MAX_LEAVES) return;

        const fall = document.createElement('div');
        fall.className = 'leaf-fall';
        fall.style.left = Math.random() * 100 + '%';
        fall.style.animationDuration = (8 + Math.random() * 6) + 's';
        fall.style.animationDelay = (Math.random() * 2) + 's';

        const leaf = document.createElement('div');
        leaf.className = 'leaf';
        leaf.style.animationDuration = (3 + Math.random() * 3) + 's';
        leaf.innerHTML = leafSVGs[Math.floor(Math.random() * leafSVGs.length)];

        fall.appendChild(leaf);
        container.appendChild(fall);

        fall.addEventListener('animationend', function() {
          fall.remove();
        });
      }

      // initial batch
      for (let i = 0; i < 5; i++) createLeaf();
      interval = setInterval(createLeaf, 2500);

      // pause when tab is hidden
      document.addEventListener('visibilitychange', function() {
        if (document.hidden) {
          clearInterval(interval);
        } else {
          interval = setInterval(createLeaf, 2500);
        }
      });
    })();
  </script>
  {% endunless %}
</body>
</html>
